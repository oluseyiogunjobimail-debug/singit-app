<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sing It ✨</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Sing It ✨</h1>
    <p>Create Nigerian AI songs</p>

    <input type="text" id="title" placeholder="Song Title" />
    <textarea id="lyrics" placeholder="Enter lyrics..."></textarea>

    <button id="createBtn">Create Song</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    const button = document.getElementById("createBtn");
    const statusDiv = document.getElementById("status");

    button.addEventListener("click", async () => {
      const title = document.getElementById("title").value;
      const lyrics = document.getElementById("lyrics").value;

      if (!title || !lyrics) {
        statusDiv.innerText = "Title and lyrics required.";
        return;
      }

      button.disabled = true;
      statusDiv.innerText = "Creating your song...";

      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title,
            lyrics
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Something went wrong");
        }

        statusDiv.innerText = "Song request sent successfully!";
      } catch (error) {
        statusDiv.innerText = "Error: " + error.message;
      }

      button.disabled = false;
    });
  </script>

</body>
</html>
