<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sing It ✨</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,150,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,200,255,0.25), transparent 40%),
    linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  width: 360px;
  backdrop-filter: blur(15px);
  text-align: center;
  color: white;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

textarea {
  height: 90px;
  resize: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  color: white;
}

button:disabled {
  opacity: 0.6;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}

audio {
  margin-top: 15px;
  width: 100%;
}
</style>
</head>

<body>

<div class="card">
  <h2>Sing It ✨</h2>
  <p>Create Nigerian AI songs</p>

  <input id="title" placeholder="Song title" />
  <textarea id="lyrics" placeholder="Write lyrics here..."></textarea>

  <button id="btn" onclick="createSong()">Create Song</button>

  <p id="status"></p>
  <div id="player"></div>
</div>

<script>
async function createSong() {
  const title = document.getElementById("title").value;
  const lyrics = document.getElementById("lyrics").value;
  const status = document.getElementById("status");
  const button = document.getElementById("btn");
  const playerDiv = document.getElementById("player");

  playerDiv.innerHTML = "";

  if (!title || !lyrics) {
    status.innerText = "Please enter title and lyrics.";
    return;
  }

  button.disabled = true;
  status.innerText = "Creating song... please wait.";

  try {
    const response = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, lyrics })
    });

    const data = await response.json();

    if (!response.ok) {
      status.innerText = "Error: " + (data.msg || data.error || JSON.stringify(data));
      button.disabled = false;
      return;
    }

    status.innerText = "Song generated successfully!";

    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = data.streamUrl;

    playerDiv.appendChild(audio);

  } catch (error) {
    status.innerText = "Error: " + error.message;
  }

  button.disabled = false;
}
</script>

</body>
</html>
